    "question": "エンジニアが、VoIPハンドセット（IP電話）が接続されたスイッチポートを構成しています。Voice VLAN 4上で、手動で割り当てられたMACアドレス「abed.abed.abed」を使用してポートセキュリティを有効にするために、エンジニアが構成する必要があるコマンドはどれですか？",
    "options": [
      "A. switchport port-security mac-address abcd.abcd.abcd",
      "B. switchport port-security mac-address abed.abed.abed vlan 4",
      "C. switchport port-security mac-address sticky abcd.abcd.abcd vlan 4",
      "D. switchport port-security mac-address abcd.abcd.abcd vlan voice"
    ],
    "answer": "B",
    "explanation": "NO.273とほぼ同一問題です。1つのスイッチポートにデータVLANと音声VLAN（Voice VLAN）が設定されている環境で、ポートセキュリティ機能を用いて「音声VLAN側」に対して特定のMACアドレスを静的に許可（割り当て）する場合、MACアドレスの後ろに `vlan[VLAN ID]`（この場合はvlan 4）を付加して明示的に指定する必要があります。これにより、データVLAN側のMACアドレス制限とは独立してIP電話を許可できます。",
    "dndTargets": [],
    "dndPairs": {}
  },
  {
    "id": "1237",
    "question": "展示を参照してください。この設定の効果は何ですか？\n(設定:\nip arp inspection vlan 2-10\ninterface fastethernet 0/1\n switchport mode access\n switchport access vlan 2)",
    "options": [
      "A. スイッチポートのインターフェーストラスト状態（trust state）は「untrusted（信頼されない）」になる。",
      "B. インターフェースが別のスイッチに接続されるまで、スイッチポートは管理的にダウンしたままになる。",
      "C. ARP ACLが欠落しているため、ダイナミックARPインスペクションは無効になる。",
      "D. スイッチポートは、入力パケットを信頼（trust）または信頼しない（untrust）ように設定されるまでダウンしたままになる。"
    ],
    "answer": "A",
    "explanation": "グローバルコンフィギュレーションで `ip arp inspection vlan 2-10` コマンドを実行してダイナミックARPインスペクション（DAI）を有効にすると、指定されたVLANに属する「すべてのインターフェース」は、セキュリティ上の理由からデフォルトで「Untrusted（信頼されない）」状態に設定されます。Untrustedポートで受信したARPパケットは、DHCPスヌーピングデータベースと照合され、不正な場合は破棄されます。ルーター等が接続されたポートのみ、後から手動で `ip arp inspection trust` に変更する必要があります。",
    "dndTargets": [],
    "dndPairs": {}
  }
];

const getExpectedChars = (answerText) => {
  return Array.from(new Set((answerText.match(/[A-E]/ig) || []).map(c => c.toUpperCase())));
};

const isDndQuestion = (questionText) => /ドラッグ(&|＆|アンド)?ドロップ|ドラッグドロップ/.test(questionText || '');

function App() {
  const [questions, setQuestions] = useState(allQuestions);
  const [isDarkMode, setIsDarkMode] = useState(false);
  const [answers, setAnswers] = useState({});
  const [history, setHistory] = useState({});
  const [showEmptyList, setShowEmptyList] = useState(false);
  const [hideEmptyQuestions, setHideEmptyQuestions] = useState(false);
  const [showImageRequiredList, setShowImageRequiredList] = useState(false);
  const [hideImageRequiredQuestions, setHideImageRequiredQuestions] = useState(false);
  const [showDndList, setShowDndList] = useState(false);
  const [hideDndQuestions, setHideDndQuestions] = useState(false);
  const [hideCorrectQuestions, setHideCorrectQuestions] = useState(false);
  const [isSidebarOpen, setIsSidebarOpen] = useState(true);

  useEffect(() => {
    if (window.innerWidth < 1024) setIsSidebarOpen(false);
  }, []);

  const updateHistory = () => {
    const nextHistory = { ...history };
    Object.keys(answers).forEach(id => {
      if (answers[id].answered && answers[id].isCorrect !== null) {
        if (!nextHistory[id]) nextHistory[id] = [];
        nextHistory[id] = [...nextHistory[id], answers[id].isCorrect].slice(-5);
      }
    });
    setHistory(nextHistory);
    return nextHistory;
  };

  const handleReset = () => {
    updateHistory();
    setAnswers({});
    setQuestions([...allQuestions].sort(() => Math.random() - 0.5));
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const handleResetWrongOnly = () => {
    const nextHistory = updateHistory();
    setAnswers({});
    const wrongQuestions = allQuestions.filter(q => {
      const hist = nextHistory[q.id];
      return hist && hist[hist.length - 1] === false;
    });
    if (wrongQuestions.length === 0) return;
    setQuestions(wrongQuestions.sort(() => Math.random() - 0.5));
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const getCurrentWrongCount = () => {
    let count = 0;
    allQuestions.forEach(q => {
      const ans = answers[q.id];
      if (ans && ans.answered) { if (ans.isCorrect === false) count++; }
      else { 
        const hist = history[q.id];
        if (hist && hist[hist.length - 1] === false) count++; 
      }
    });
    return count;
  };

  const scrollToAnswer = (qId) => {
    setTimeout(() => {
      const element = document.getElementById("answer-area-" + qId);
      if (element) {
        const y = element.getBoundingClientRect().top + window.scrollY - 250;
        window.scrollTo({ top: y, behavior: 'smooth' });
      }
    }, 100);
  };

  const handleOptionClick = (qId, option, answerText) => {
    if (answers[qId]?.answered) return;
    const expectedChars = getExpectedChars(answerText);
    const isMultipleChoice = expectedChars.length > 1;

    if (isMultipleChoice) {
      setAnswers(prev => {
        const current = prev[qId] || { selectedOptions: [] };
        const isSelected = current.selectedOptions.includes(option);
        const newSelected = isSelected ? current.selectedOptions.filter(o => o !== option) : [...current.selectedOptions, option];
        return { ...prev, [qId]: { ...current, selectedOptions: newSelected } };
      });
    } else {
      setAnswers(prev => {
        const optMatch = option.match(/^([A-E])\./i);
        const optChar = optMatch ? optMatch[1].toUpperCase() : null;
        let isCorrect = false;
        if (expectedChars.length === 1 && optChar) {
          isCorrect = expectedChars[0] === optChar;
        } else if (expectedChars.length === 0) {
          const optionText = option.replace(/^([A-E])\.\s*/i, '').trim();
          isCorrect = optionText.length > 0 && answerText.includes(optionText);
        }
        return { ...prev, [qId]: { selectedOptions: [option], answered: true, isCorrect } };
      });
      scrollToAnswer(qId);
    }
  };

  const handleConfirmAnswer = (qId, answerText) => {
    setAnswers(prev => {
      const current = prev[qId] || { selectedOptions: [] };
      const expectedChars = getExpectedChars(answerText);
      let isCorrect = null;
      if (expectedChars.length > 0 && current.selectedOptions.length > 0) {
        const selectedChars = current.selectedOptions.map(opt => {
          const match = opt.match(/^([A-E])\./i);
          return match ? match[1].toUpperCase() : null;
        }).filter(Boolean);
        isCorrect = expectedChars.length === selectedChars.length && expectedChars.every(c => selectedChars.includes(c));
      } else if (current.selectedOptions.length > 0) {
        isCorrect = null;
      } else if (expectedChars.length > 0 && current.selectedOptions.length === 0) {
        isCorrect = false;
      }
      return { ...prev, [qId]: { ...current, answered: true, isCorrect } };
    });
    scrollToAnswer(qId);
  };

  const handleDndSourceClick = (qId, option) => {
    if (answers[qId]?.answered) return;
    setAnswers(prev => {
      const current = prev[qId] || { dndMapping: {}, activeSource: null };
      return {
        ...prev,
        [qId]: {
          ...current,
          activeSource: current.activeSource === option ? null : option
        }
      };
    });
  };

  const handleDndTargetClick = (qId, target) => {
    if (answers[qId]?.answered) return;
    setAnswers(prev => {
      const current = prev[qId] || { dndMapping: {}, activeSource: null };
      const newMapping = { ...current.dndMapping };
      
      if (current.activeSource) {
        Object.keys(newMapping).forEach(t => {
          if (newMapping[t] === current.activeSource) {
            delete newMapping[t];
          }
        });
        newMapping[target] = current.activeSource;
        return {
          ...prev,
          [qId]: { ...current, dndMapping: newMapping, activeSource: null }
        };
      } else {
        if (newMapping[target]) {
          const sourceToRestore = newMapping[target];
          delete newMapping[target];
          return {
            ...prev,
            [qId]: { ...current, dndMapping: newMapping, activeSource: sourceToRestore }
          };
        }
        return prev;
      }
    });
  };

  const handleConfirmDnd = (qId) => {
    setAnswers(prev => {
      const current = prev[qId] || { dndMapping: {} };
      const q = allQuestions.find(q => q.id === qId);
      let isCorrect = true;
      const sources = Object.keys(q.dndPairs);
      if (sources.length === 0) {
        isCorrect = false;
      } else {
        for (let target of q.dndTargets) {
          const mappedSource = current.dndMapping[target];
          if (!mappedSource || q.dndPairs[mappedSource] !== target) {
            isCorrect = false;
            break;
          }
        }
      }
      return { ...prev, [qId]: { ...current, answered: true, isCorrect } };
    });
    scrollToAnswer(qId);
  };

  const handleSelfJudge = (qId, isCorrect) => {
    setAnswers(prev => ({
      ...prev,
      [qId]: { ...prev[qId], answered: true, isCorrect }
    }));
    scrollToAnswer(qId);
  };

  const toggleDarkMode = () => setIsDarkMode(!isDarkMode);
  const scrollToTop = () => window.scrollTo({ top: 0, behavior: 'smooth' });
  const scrollToBottom = () => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

  const wrongCount = getCurrentWrongCount();
  const emptyQuestions = allQuestions.filter(q => !q.answer.trim() && !q.explanation.trim());
  const imageRequiredQuestions = allQuestions.filter(q => q.question.includes('展示画像'));
  const dndQuestions = allQuestions.filter(q => isDndQuestion(q.question));

  const displayQuestions = questions.filter(q => {
    if (hideEmptyQuestions && !q.answer.trim() && !q.explanation.trim()) return false;
    if (hideImageRequiredQuestions && q.question.includes('展示画像')) return false;
    if (hideDndQuestions && isDndQuestion(q.question)) return false;
    if (hideCorrectQuestions && history[q.id] && history[q.id][history[q.id].length - 1] === true) return false;
    return true;
  });

  const scrollToNextUnanswered = () => {
    const index = displayQuestions.findIndex(q => !answers[q.id]?.answered);
    if (index !== -1) {
      const element = document.getElementById("question-" + index);
      if (element) {
        const y = element.getBoundingClientRect().top + window.scrollY - 100;
        window.scrollTo({ top: y, behavior: 'smooth' });
      }
    }
  };

  return (
    <div className={isDarkMode ? 'dark' : ''}>
      <div className="min-h-screen bg-slate-100 dark:bg-slate-900 flex text-slate-900 dark:text-slate-100 transition-colors duration-300 relative">
        
        {isSidebarOpen && (
          <div 
            className="fixed inset-0 bg-black/50 z-30 lg:hidden"
            onClick={() => setIsSidebarOpen(false)}
          />
        )}

        <aside className={"w-72 shrink-0 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 h-screen sticky top-0 flex-col z-40 fixed lg:relative transition-transform " + (isSidebarOpen ? "flex" : "hidden")}>
          <div className="p-4 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center">
            <h2 className="font-bold text-slate-800 dark:text-slate-200 flex items-center gap-2 text-sm">
              <span>📋</span> NO. 一覧 ({allQuestions.length})
            </h2>
            <button className="lg:hidden p-1 text-slate-500" onClick={() => setIsSidebarOpen(false)}>
              <span>❌</span>
            </button>
          </div>
          
          <div className="px-3 py-2 bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700 text-[10px] flex flex-wrap gap-2 justify-center text-slate-500 dark:text-slate-400">
            <div className="flex items-center gap-1"><span className="w-2 h-2 rounded-full border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800"></span>未答</div>
            <div className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-green-100 border border-green-300 dark:bg-green-900/40 dark:border-green-700"></span>正解</div>
            <div className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-yellow-100 border border-yellow-300 dark:bg-yellow-900/40 dark:border-yellow-700"></span>空欄</div>
            <div className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-blue-100 border border-blue-300 dark:bg-blue-900/40 dark:border-blue-700"></span>画像</div>
            <div className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-purple-100 border border-purple-300 dark:bg-purple-900/40 dark:border-purple-700"></span>D&D</div>
          </div>

          <div className="flex-1 overflow-y-auto p-2">
            <div className="grid grid-cols-5 gap-1.5">
              {allQuestions.map((q) => {
                const isEmpty = !q.answer.trim() && !q.explanation.trim();
                const isImageReq = q.question.includes('展示画像');
                const isDndReq = isDndQuestion(q.question);
                const isCorrect = history[q.id] && history[q.id][history[q.id].length - 1] === true;

                const isHideEmpty = hideEmptyQuestions && isEmpty;
                const isHideImageReq = hideImageRequiredQuestions && isImageReq;
                const isHideDnd = hideDndQuestions && isDndReq;
                const isHideCorrect = hideCorrectQuestions && isCorrect;
                const isHidden = isHideEmpty || isHideImageReq || isHideDnd || isHideCorrect;
                
                let statusClass = "bg-white text-slate-700 hover:bg-slate-100 border-slate-200 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700 dark:border-slate-600";
                let tooltipSuffix = "";

                if (isEmpty) {
                  statusClass = "bg-yellow-50 text-yellow-800 hover:bg-yellow-100 border-yellow-300 dark:bg-yellow-900/30 dark:text-yellow-300 dark:hover:bg-yellow-900/50 dark:border-yellow-700/50";
                  tooltipSuffix = " (空欄)";
                } else if (isCorrect) {
                  statusClass = "bg-green-50 text-green-800 hover:bg-green-100 border-green-300 dark:bg-green-900/30 dark:text-green-300 dark:hover:bg-green-900/50 dark:border-green-700/50";
                  tooltipSuffix = " (正解済)";
                } else if (isDndReq) {
                  statusClass = "bg-purple-50 text-purple-800 hover:bg-purple-100 border-purple-300 dark:bg-purple-900/30 dark:text-purple-300 dark:hover:bg-purple-900/50 dark:border-purple-700/50";
                  tooltipSuffix = " (D&D)";
                } else if (isImageReq) {
                  statusClass = "bg-blue-50 text-blue-800 hover:bg-blue-100 border-blue-300 dark:bg-blue-900/30 dark:text-blue-300 dark:hover:bg-blue-900/50 dark:border-blue-700/50";
                  tooltipSuffix = " (画像)";
                } 
                
                const displayIndex = displayQuestions.findIndex(dq => dq.id === q.id);
                const shortId = q.id.replace(/^(NO\.|Q\.?|問|問題)\s*/i, '');

                return (
                  <button 
                    key={q.id}
                    onClick={() => {
                      if (!isHidden && displayIndex !== -1) {
                        const element = document.getElementById("question-" + displayIndex);
                        if (element) {
                          const y = element.getBoundingClientRect().top + window.scrollY - 100;
                          window.scrollTo({ top: y, behavior: 'smooth' });
                          if (window.innerWidth < 1024) setIsSidebarOpen(false);
                        }
                      }
                    }}
                    disabled={isHidden}
                    className={"py-1.5 px-1 rounded border text-[11px] font-mono text-center transition-colors shadow-sm " + statusClass + (isHidden ? " opacity-30 cursor-not-allowed shadow-none" : " cursor-pointer")}
                    title={isHidden ? "[非表示] " + q.id + tooltipSuffix : q.id + tooltipSuffix + " へ移動"}
                  >
                    <span className="truncate block w-full">{shortId}</span>
                  </button>
                )
              })}
            </div>
          </div>
        </aside>

        <div className="flex-1 flex flex-col items-center p-4 md:p-8 w-full max-w-full overflow-x-hidden">
          <div className="w-full max-w-4xl flex justify-between items-center mb-6 sticky top-4 z-10 bg-white/90 dark:bg-slate-800/90 backdrop-blur px-4 sm:px-6 py-3 rounded-2xl shadow-sm border border-transparent dark:border-slate-700">
            <div className="flex items-center gap-2 sm:gap-4">
              <button
                onClick={() => setIsSidebarOpen(!isSidebarOpen)}
                className="flex items-center gap-2 text-slate-600 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white transition-colors p-2 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700"
                title="NO.一覧を開閉"
              >
                <span>☰</span>
              </button>
            </div>
            
            <div className="flex flex-wrap gap-2 items-center justify-end">
              <button onClick={toggleDarkMode} className="p-2 mr-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">{isDarkMode ? '☀️' : '🌙'}</button>
              <button
                onClick={() => setHideCorrectQuestions(!hideCorrectQuestions)}
                className={"flex items-center gap-1 sm:gap-2 px-3 py-2 rounded-lg transition-colors shadow-sm font-semibold text-sm sm:text-base " + (hideCorrectQuestions ? "bg-green-600 text-white hover:bg-green-700" : "bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700")}
              >
                <span>{hideCorrectQuestions ? '✅' : '☑️'}</span>
                <span className="hidden sm:inline">正解済を除外</span>
                <span className="sm:hidden">正解除外</span>
              </button>
              <button
                onClick={handleResetWrongOnly}
                disabled={wrongCount === 0}
                className="flex items-center gap-1 sm:gap-2 px-3 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 disabled:opacity-50 transition-colors shadow-sm font-semibold text-sm sm:text-base"
              >
                <span>⚠️</span>
                <span className="hidden sm:inline">誤答のみシャッフル</span>
                <span className="sm:hidden">誤答</span>
                <span className="opacity-80">({wrongCount})</span>
              </button>
              <button
                onClick={handleReset}
                className="flex items-center gap-1 sm:gap-2 px-3 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors shadow-sm font-semibold text-sm sm:text-base"
              >
                <span>🔄</span>
                <span className="hidden sm:inline">全問シャッフル</span>
                <span className="sm:hidden">全問</span>
              </button>
            </div>
          </div>

          {emptyQuestions.length > 0 && (
            <div className="w-full max-w-4xl mb-4 bg-yellow-50 dark:bg-yellow-900/20 border-l-4 border-yellow-400 p-4 rounded-r-lg shadow-sm">
              <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-2">
                <div className="flex items-center gap-2 text-yellow-800 dark:text-yellow-400 font-bold">
                  <span>⚠️</span> 解答・解説が空欄の問題があります ({emptyQuestions.length}問)
                </div>
                <div className="flex gap-2">
                  <button onClick={() => setShowEmptyList(!showEmptyList)} className="px-3 py-1.5 text-sm font-medium bg-yellow-200 dark:bg-yellow-800/50 text-yellow-800 dark:text-yellow-200 rounded hover:bg-yellow-300 dark:hover:bg-yellow-700/50 transition-colors">
                    <span>📜</span> {showEmptyList ? '一覧を隠す' : '一覧を表示'}
                  </button>
                  <button onClick={() => setHideEmptyQuestions(!hideEmptyQuestions)} className={"px-3 py-1.5 text-sm font-medium rounded transition-colors " + (hideEmptyQuestions ? "bg-blue-500 text-white hover:bg-blue-600 shadow-sm" : "bg-yellow-200 dark:bg-yellow-800/50 text-yellow-800 dark:text-yellow-200 hover:bg-yellow-300 dark:hover:bg-yellow-700/50")}>
                    <span>{hideEmptyQuestions ? '👁️' : '🚫'}</span> {hideEmptyQuestions ? '除外を解除' : 'これらを除外'}
                  </button>
                </div>
              </div>
              
              {showEmptyList && (
                <div className="text-yellow-700 dark:text-yellow-300 text-sm flex flex-wrap gap-2 mt-3 p-3 bg-yellow-100/50 dark:bg-yellow-900/30 rounded border border-yellow-200/50 dark:border-yellow-800/30">
                  {emptyQuestions.map(q => {
                    const displayIndex = displayQuestions.findIndex(dq => dq.id === q.id);
                    const isDisplayed = displayIndex !== -1;
                    return (
                      <button 
                        key={q.id} 
                        onClick={() => {
                          if (isDisplayed) {
                            const element = document.getElementById("question-" + displayIndex);
                            if (element) {
                              const y = element.getBoundingClientRect().top + window.scrollY - 100;
                              window.scrollTo({ top: y, behavior: 'smooth' });
                            }
                          }
                        }}
                        disabled={!isDisplayed}
                        title={isDisplayed ? "この問題へ移動" : "現在非表示です"}
                        className={"px-2.5 py-1.5 rounded font-mono shadow-sm border text-xs sm:text-sm " + (isDisplayed ? "bg-white dark:bg-yellow-900/60 border-yellow-200 dark:border-yellow-800/50 hover:bg-yellow-50 dark:hover:bg-yellow-800 cursor-pointer" : "bg-white/50 dark:bg-yellow-900/30 border-yellow-200/50 dark:border-yellow-800/30 opacity-50 cursor-not-allowed")}
                      >
                        {q.id}
                      </button>
                    )
                  })}
                </div>
              )}
            </div>
          )}

          {imageRequiredQuestions.length > 0 && (
            <div className="w-full max-w-4xl mb-4 bg-blue-50 dark:bg-blue-900/20 border-l-4 border-blue-400 p-4 rounded-r-lg shadow-sm">
              <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-2">
                <div className="flex items-center gap-2 text-blue-800 dark:text-blue-400 font-bold">
                  <span>🖼️</span> 展示画像が必要な問題があります ({imageRequiredQuestions.length}問)
                </div>
                <div className="flex gap-2">
                  <button onClick={() => setShowImageRequiredList(!showImageRequiredList)} className="px-3 py-1.5 text-sm font-medium bg-blue-200 dark:bg-blue-800/50 text-blue-800 dark:text-blue-200 rounded hover:bg-blue-300 dark:hover:bg-blue-700/50 transition-colors">
                    <span>📜</span> {showImageRequiredList ? '一覧を隠す' : '一覧を表示'}
                  </button>
                  <button onClick={() => setHideImageRequiredQuestions(!hideImageRequiredQuestions)} className={"px-3 py-1.5 text-sm font-medium rounded transition-colors " + (hideImageRequiredQuestions ? "bg-slate-600 text-white hover:bg-slate-700 shadow-sm" : "bg-blue-200 dark:bg-blue-800/50 text-blue-800 dark:text-blue-200 hover:bg-blue-300 dark:hover:bg-blue-700/50")}>
                    <span>{hideImageRequiredQuestions ? '👁️' : '🚫'}</span> {hideImageRequiredQuestions ? '除外を解除' : 'これらを除外'}
                  </button>
                </div>
              </div>
              
              {showImageRequiredList && (
                <div className="text-blue-700 dark:text-blue-300 text-sm flex flex-wrap gap-2 mt-3 p-3 bg-blue-100/50 dark:bg-blue-900/30 rounded border border-blue-200/50 dark:border-blue-800/30">
                  {imageRequiredQuestions.map(q => {
                    const displayIndex = displayQuestions.findIndex(dq => dq.id === q.id);
                    const isDisplayed = displayIndex !== -1;
                    return (
                      <button 
                        key={q.id} 
                        onClick={() => {
                          if (isDisplayed) {
                            const element = document.getElementById("question-" + displayIndex);
                            if (element) {
                              const y = element.getBoundingClientRect().top + window.scrollY - 100;
                              window.scrollTo({ top: y, behavior: 'smooth' });
                            }
                          }
                        }}
                        disabled={!isDisplayed}
                        title={isDisplayed ? "この問題へ移動" : "現在非表示です"}
                        className={"px-2.5 py-1.5 rounded font-mono shadow-sm border text-xs sm:text-sm " + (isDisplayed ? "bg-white dark:bg-blue-900/60 border-blue-200 dark:border-blue-800/50 hover:bg-blue-50 dark:hover:bg-blue-800 cursor-pointer" : "bg-white/50 dark:bg-blue-900/30 border-blue-200/50 dark:border-blue-800/30 opacity-50 cursor-not-allowed")}
                      >
                        {q.id}
                      </button>
                    )
                  })}
                </div>
              )}
            </div>
          )}

          {dndQuestions.length > 0 && (
            <div className="w-full max-w-4xl mb-6 bg-purple-50 dark:bg-purple-900/20 border-l-4 border-purple-400 p-4 rounded-r-lg shadow-sm">
              <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-2">
                <div className="flex items-center gap-2 text-purple-800 dark:text-purple-400 font-bold">
                  <span>🖱️</span> ドラッグ＆ドロップ問題が含まれています ({dndQuestions.length}問)
                </div>
                <div className="flex gap-2">
                  <button onClick={() => setShowDndList(!showDndList)} className="px-3 py-1.5 text-sm font-medium bg-purple-200 dark:bg-purple-800/50 text-purple-800 dark:text-purple-200 rounded hover:bg-purple-300 dark:hover:bg-purple-700/50 transition-colors">
                    <span>📜</span> {showDndList ? '一覧を隠す' : '一覧を表示'}
                  </button>
                  <button onClick={() => setHideDndQuestions(!hideDndQuestions)} className={"px-3 py-1.5 text-sm font-medium rounded transition-colors " + (hideDndQuestions ? "bg-slate-600 text-white hover:bg-slate-700 shadow-sm" : "bg-purple-200 dark:bg-purple-800/50 text-purple-800 dark:text-purple-200 hover:bg-purple-300 dark:hover:bg-purple-700/50")}>
                    <span>{hideDndQuestions ? '👁️' : '🚫'}</span> {hideDndQuestions ? '除外を解除' : 'これらを除外'}
                  </button>
                </div>
              </div>
              
              {showDndList && (
                <div className="text-purple-700 dark:text-purple-300 text-sm flex flex-wrap gap-2 mt-3 p-3 bg-purple-100/50 dark:bg-purple-900/30 rounded border border-purple-200/50 dark:border-purple-800/30">
                  {dndQuestions.map(q => {
                    const displayIndex = displayQuestions.findIndex(dq => dq.id === q.id);
                    const isDisplayed = displayIndex !== -1;
                    return (
                      <button 
                        key={q.id} 
                        onClick={() => {
                          if (isDisplayed) {
                            const element = document.getElementById("question-" + displayIndex);
                            if (element) {
                              const y = element.getBoundingClientRect().top + window.scrollY - 100;
                              window.scrollTo({ top: y, behavior: 'smooth' });
                            }
                          }
                        }}
                        disabled={!isDisplayed}
                        title={isDisplayed ? "この問題へ移動" : "現在非表示です"}
                        className={"px-2.5 py-1.5 rounded font-mono shadow-sm border text-xs sm:text-sm " + (isDisplayed ? "bg-white dark:bg-purple-900/60 border-purple-200 dark:border-purple-800/50 hover:bg-purple-50 dark:hover:bg-purple-800 cursor-pointer" : "bg-white/50 dark:bg-purple-900/30 border-purple-200/50 dark:border-purple-800/30 opacity-50 cursor-not-allowed")}
                      >
                        {q.id}
                      </button>
                    )
                  })}
                </div>
              )}
            </div>
          )}

          <div className="w-full max-w-4xl space-y-8">
            {displayQuestions.map((q, index) => {
              const ansState = answers[q.id] || { selectedOptions: [] };
              const qHistory = history[q.id] || [];
              const isWrongHistory = qHistory.length > 0 && qHistory[qHistory.length - 1] === false;
              
              return (
                <div id={"question-" + index} key={q.id} className={"bg-white dark:bg-slate-800 rounded-2xl shadow-lg overflow-hidden flex flex-col border-2 transition-colors " + (isWrongHistory ? "border-red-300 dark:border-red-500/50" : "border-transparent dark:border-slate-700")}>
                  {/* ヘッダー */}
                  <div className="bg-slate-800 dark:bg-slate-950 text-white px-6 py-4 flex items-center justify-between">
                    <h2 className="text-xl font-bold flex items-center flex-wrap gap-2">
                      <span className="bg-slate-700 dark:bg-slate-800 px-3 py-1 rounded-md text-sm whitespace-nowrap">問題{index + 1}</span>
                      <span className="text-lg">{q.id}</span>
                      <div className="flex items-center gap-2 ml-2 text-sm text-slate-300 dark:text-slate-400 bg-slate-700/50 dark:bg-slate-800/50 px-3 py-1.5 rounded-lg">
                        <span className="text-xs hidden sm:inline">過去正誤（左から新しい順）</span>
                        <span className="text-xs sm:hidden">過去</span>
                        <div className="flex gap-1">
                          {Array.from({ length: 5 }).map((_, i) => {
                            const res = [...qHistory].reverse()[i];
                            return (
                              <span key={i} title={res === true ? "正解" : res === false ? "不正解" : "まだ"} className="text-base leading-none">
                                {res === true ? '🙆‍♂️' : res === false ? '🙅' : '🥷'}
                              </span>
                            );
                          })}
                        </div>
                      </div>
                    </h2>
                    {isWrongHistory && (
                      <div className="flex items-center gap-1 text-red-300 dark:text-red-400 text-sm font-bold bg-red-900/30 px-3 py-1 rounded-full">
                        <span>⚠️</span>
                        前回誤答
                      </div>
                    )}
                  </div>

                  {/* 問題エリア */}
                  <div className="p-6 md:p-8">
                    <div className="prose dark:prose-invert max-w-none mb-6 whitespace-pre-wrap text-slate-800 dark:text-slate-200 text-lg leading-relaxed">
                      {q.question}
                    </div>

                    <div id={"answer-area-" + q.id}></div>

                    {/* D&D 問題か通常の選択肢問題で分岐 */}
                    {isDndQuestion(q.question) && q.dndTargets?.length > 0 ? (
                      <div className="flex flex-col md:flex-row gap-6 mb-6">
                        {/* 左側：選択肢 */}
                        <div className="w-full md:w-1/3 space-y-2">
                          <h3 className="font-bold text-slate-600 dark:text-slate-400 mb-3 text-sm">選択肢 (タップして選択)</h3>
                          {q.options.map((opt, idx) => {
                            const isUsed = Object.values(ansState.dndMapping || {}).includes(opt);
                            const isActive = ansState.activeSource === opt;
                            let btnClass = "w-full text-left p-3 border rounded-xl transition-all duration-200 text-sm ";
                            
                            if (ansState.answered) {
                              btnClass += "bg-slate-50 border-slate-200 text-slate-400 opacity-50 dark:bg-slate-800/50 dark:border-slate-700 dark:text-slate-500 cursor-default";
                            } else {
                              if (isUsed) {
                                btnClass += "bg-slate-100 border-slate-200 text-slate-400 dark:bg-slate-800/50 dark:border-slate-700 dark:text-slate-500 opacity-50 cursor-not-allowed";
                              } else if (isActive) {
                                btnClass += "bg-blue-100 border-blue-500 text-blue-900 dark:bg-blue-900/60 dark:border-blue-400 dark:text-blue-100 ring-2 ring-blue-400 ring-opacity-50 font-bold shadow-md";
                              } else {
                                btnClass += "bg-white border-slate-200 hover:border-blue-300 text-slate-700 dark:bg-slate-800 dark:border-slate-600 dark:text-slate-200 hover:shadow-sm";
                              }
                            }
                            return (
                              <button 
                                key={idx} 
                                onClick={() => handleDndSourceClick(q.id, opt)}
                                disabled={ansState.answered || (isUsed && !isActive)}
                                className={btnClass}
                              >
                                {opt}
                              </button>
                            );
                          })}
                        </div>
                        
                        {/* 右側：ターゲット */}
                        <div className="w-full md:w-2/3 space-y-3">
                          <h3 className="font-bold text-slate-600 dark:text-slate-400 mb-3 text-sm">ドロップ先 (選択肢を選んでから枠をタップ)</h3>
                          {q.dndTargets.map((target, idx) => {
                            const mappedSource = (ansState.dndMapping || {})[target];
                            const isCorrectPair = ansState.answered && q.dndPairs[mappedSource] === target;
                            const isWrongPair = ansState.answered && mappedSource && !isCorrectPair;
                            const missedSource = ansState.answered && !mappedSource;
                            
                            let slotClass = "w-full p-2 border-2 border-dashed rounded-xl min-h-[3.5rem] flex items-center justify-center transition-colors text-sm ";
                            
                            if (!ansState.answered) {
                               if (ansState.activeSource && !mappedSource) {
                                 slotClass += "cursor-pointer border-blue-300 bg-blue-50/50 dark:border-blue-700 dark:bg-blue-900/20 hover:bg-blue-100 dark:hover:bg-blue-900/40";
                               } else if (ansState.activeSource && mappedSource) {
                                 slotClass += "cursor-pointer border-slate-300 bg-slate-50 dark:border-slate-600 dark:bg-slate-800/50 hover:border-blue-300 dark:hover:border-blue-600";
                               } else if (!ansState.activeSource && mappedSource) {
                                 slotClass += "cursor-pointer border-slate-300 bg-slate-50 dark:border-slate-600 dark:bg-slate-800/50 hover:border-red-300 dark:hover:border-red-600";
                               } else {
                                 slotClass += "cursor-default border-slate-200 bg-slate-50/50 dark:border-slate-700/50 dark:bg-slate-800/30";
                               }
                            } else {
                               slotClass += "cursor-default border-solid ";
                               if (isCorrectPair) slotClass += "bg-green-50 border-green-400 dark:bg-green-900/20 dark:border-green-600";
                               else if (isWrongPair || missedSource) slotClass += "bg-red-50 border-red-400 dark:bg-red-900/20 dark:border-red-600";
                            }

                            return (
                              <div key={idx} className="flex flex-col sm:flex-row gap-3 sm:items-stretch bg-slate-50/50 dark:bg-slate-800/30 p-3 rounded-xl border border-slate-100 dark:border-slate-700/50">
                                {/* ドロップ枠 */}
                                <div 
                                  className={"sm:w-5/12 shrink-0 " + slotClass}
                                  onClick={() => handleDndTargetClick(q.id, target)}
                                >
                                  {mappedSource ? (
                                    <div className="w-full h-full bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-500 rounded-lg p-2 text-slate-800 dark:text-slate-100 shadow-sm flex justify-between items-center relative font-medium">
                                      <span>{mappedSource}</span>
                                      {ansState.answered && (
                                        <span className="absolute -right-2 -top-2 bg-white dark:bg-slate-800 rounded-full shadow-sm">
                                          {isCorrectPair ? <span>✔️</span> : <span>❌</span>}
                                        </span>
                                      )}
                                    </div>
                                  ) : (
                                    <span className="text-slate-400 dark:text-slate-500 italic px-2">
                                      {ansState.answered ? "未解答" : "ここに配置"}
                                    </span>
                                  )}
                                </div>
                                {/* 説明文 */}
                                <div className="sm:w-7/12 flex items-center text-sm text-slate-700 dark:text-slate-300">
                                  {target}
                                </div>
                              </div>
                            );
                          })}
                          
                          {!ansState.answered && (
                            <button 
                              onClick={() => handleConfirmDnd(q.id)} 
                              className="mt-6 w-full py-4 bg-purple-50 text-purple-700 border-2 border-dashed border-purple-300 dark:bg-purple-900/20 dark:text-purple-300 dark:border-purple-700/50 font-bold rounded-xl hover:bg-purple-100 transition-colors flex items-center justify-center gap-2"
                            >
                              <span>✅</span> 解答を確定する
                            </button>
                          )}
                        </div>
                      </div>
                    ) : q.options.length > 0 ? (
                      <div className="space-y-3 mb-6">
                        {q.options.map((opt, idx) => {
                          const isSelected = ansState.selectedOptions?.includes(opt);
                          const optMatch = opt.match(/^([A-E])\./i);
                          const optChar = optMatch ? optMatch[1].toUpperCase() : null;
                          const expectedChars = getExpectedChars(q.answer);
                          // 正解かどうかの判定
                          const isExpected = optChar ? expectedChars.includes(optChar) : q.answer.includes(opt.replace(/^([A-E])\.\s*/i, '').trim());

                          let btnClass = "w-full text-left p-4 border rounded-xl transition-all duration-200 ";
                          
                          if (!ansState.answered) {
                            if (isSelected) {
                              btnClass += "bg-blue-100 border-blue-500 text-blue-900 dark:bg-blue-900/40 dark:border-blue-500 dark:text-blue-100";
                            } else {
                              btnClass += "bg-white border-slate-200 hover:border-blue-400 text-slate-700 dark:bg-slate-800 dark:border-slate-700 dark:text-slate-300 dark:hover:border-blue-500";
                            }
                          } else {
                            btnClass += "cursor-default ";
                            if (isSelected && isExpected) {
                              btnClass += "bg-green-100 border-green-500 text-green-900 dark:bg-green-900/40 dark:border-green-500 dark:text-green-100 font-medium";
                            } else if (isSelected && !isExpected) {
                              btnClass += "bg-red-100 border-red-500 text-red-900 dark:bg-red-900/40 dark:border-red-500 dark:text-red-100 font-medium";
                            } else if (!isSelected && isExpected) {
                              btnClass += "bg-white border-green-500 border-2 text-slate-700 dark:bg-slate-800 dark:border-green-500 dark:text-slate-300";
                            } else {
                              btnClass += "bg-slate-50 border-slate-200 text-slate-400 dark:bg-slate-800/50 dark:border-slate-700 dark:text-slate-500 opacity-60";
                            }
                          }

                          return (
                            <button
                              key={idx}
                              disabled={ansState.answered}
                              onClick={() => handleOptionClick(q.id, opt, q.answer)}
                              className={btnClass}
                            >
                              <div className="flex items-center justify-between">
                                <span>{opt}</span>
                                {ansState.answered && (
                                  isSelected && isExpected ? <span>✔️</span> :
                                  isSelected && !isExpected ? <span>❌</span> :
                                  !isSelected && isExpected ? <span className="opacity-50">✔️</span> : null
                                )}
                              </div>
                            </button>
                          );
                        })}
                        
                        {/* 解答確定ボタン */}
                        {!ansState.answered && getExpectedChars(q.answer).length > 1 && (
                          <button
                            onClick={() => handleConfirmAnswer(q.id, q.answer)}
                            className="mt-4 w-full py-4 bg-blue-50 text-blue-700 border-2 border-dashed border-blue-300 dark:bg-blue-900/20 dark:text-blue-300 dark:border-blue-700/50 font-bold rounded-xl hover:bg-blue-100 dark:hover:bg-blue-900/40 transition-colors flex items-center justify-center gap-2"
                          >
                            <span>✅</span>
                            解答を確定する
                          </button>
                        )}
                      </div>
                    ) : (
                      // 選択肢がない問題向けのアクション
                      !ansState.answered && (
                        <div className="mb-6 bg-slate-50 dark:bg-slate-800/50 p-6 rounded-xl border border-slate-200 dark:border-slate-700 flex flex-col items-center">
                          <p className="text-slate-600 dark:text-slate-400 mb-4 font-medium text-center">この問題には選択肢がありません。<br/>答えを思い浮かべてから解答を表示してください。</p>
                          <button
                            onClick={() => handleConfirmAnswer(q.id, q.answer)}
                            className="px-6 py-3 bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300 font-bold rounded-xl hover:bg-blue-200 dark:hover:bg-blue-900/60 transition-colors flex items-center gap-2"
                          >
                            <span>👁️</span>
                            解答と解説を確認する
                          </button>
                        </div>
                      )
                    )}

                    {/* 解説エリア (回答後または自己判定後に表示) */}
                    {ansState.answered && (
                      <div className="animate-in fade-in slide-in-from-top-4 duration-300 mt-6 border-t border-slate-100 dark:border-slate-700 pt-6">
                        
                        {/* 自己判定ボタン（判定不能だった場合） */}
                        {ansState.isCorrect === null && (
                           <div className="mb-6 flex flex-col items-center p-4 bg-orange-50 dark:bg-orange-900/20 rounded-xl border border-orange-200 dark:border-orange-800/50">
                              <p className="text-orange-800 dark:text-orange-300 font-medium mb-3">結果を記録してください</p>
                              <div className="flex gap-4">
                                <button onClick={() => handleSelfJudge(q.id, true)} className="px-5 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 font-bold flex items-center gap-2"><span>✔️</span> 正解した</button>
                                <button onClick={() => handleSelfJudge(q.id, false)} className="px-5 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 font-bold flex items-center gap-2"><span>❌</span> 間違えた</button>
                              </div>
                           </div>
                        )}

                        <div className="bg-green-50 dark:bg-green-900/20 border-l-4 border-green-500 p-5 rounded-r-xl shadow-sm mb-6">
                          <div className="flex items-center gap-2 text-green-700 dark:text-green-400 font-bold text-lg mb-2">
                            <span>✅</span>
                            Answer
                          </div>
                          <div className="text-green-900 dark:text-green-100 font-medium whitespace-pre-wrap">
                            {q.answer || "解答が指定されていません"}
                          </div>
                        </div>

                        {/* 次の問題へボタン (回答と解説の間に配置) */}
                        {index < displayQuestions.length - 1 && (
                          <button 
                            onClick={() => {
                              const element = document.getElementById("question-" + (index + 1));
                              if (element) {
                                const y = element.getBoundingClientRect().top + window.scrollY - 100;
                                window.scrollTo({ top: y, behavior: 'smooth' });
                              }
                            }}
                            className="mb-6 w-full py-3 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-bold rounded-xl hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors flex items-center justify-center gap-2 border border-slate-200 dark:border-slate-700 shadow-sm"
                          >
                            次の問題へ <span>⬇️</span>
                          </button>
                        )}

                        {q.explanation && (
                          <div className="bg-blue-50 dark:bg-blue-900/20 border-l-4 border-blue-500 p-5 rounded-r-xl shadow-sm">
                            <div className="flex items-center gap-2 text-blue-700 dark:text-blue-400 font-bold text-lg mb-2">
                              <span>ℹ️</span>
                              Explanation
                            </div>
                            <div className="text-blue-900 dark:text-blue-100 text-sm md:text-base leading-relaxed whitespace-pre-wrap">
                              {q.explanation}
                            </div>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>

          <div className="fixed bottom-6 right-6 flex flex-col gap-3 z-50">
            <button
              onClick={scrollToTop}
              className="p-3 bg-slate-800 dark:bg-slate-700 text-white rounded-full shadow-xl hover:bg-slate-700 dark:hover:bg-slate-600 transition-all opacity-80 hover:opacity-100 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-800"
              title="ページ上部へ"
            >
              <span>⬆️</span>
            </button>
            <button
              onClick={scrollToNextUnanswered}
              className="p-3 bg-blue-600 text-white rounded-full shadow-xl hover:bg-blue-700 transition-all opacity-80 hover:opacity-100 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-600"
              title="最初の未解答問題へ"
            >
              <span>🎯</span>
            </button>
            <button
              onClick={scrollToBottom}
              className="p-3 bg-slate-800 dark:bg-slate-700 text-white rounded-full shadow-xl hover:bg-slate-700 dark:hover:bg-slate-600 transition-all opacity-80 hover:opacity-100 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-800"
              title="ページ下部へ"
            >
              <span>⬇️</span>
            </button>
          </div>

          {/* 単独HTMLエクスポート機能エリア */}
          <div className="w-full max-w-4xl mt-12 mb-8 bg-white dark:bg-slate-800 rounded-2xl shadow-lg p-6 md:p-8 border border-slate-200 dark:border-slate-700">
            <h3 className="text-xl font-bold mb-3 flex items-center gap-2 text-slate-800 dark:text-slate-100">
              <span>📦</span>
              単独アプリとしてエクスポート
            </h3>
            <p className="text-slate-600 dark:text-slate-400 mb-6 text-sm md:text-base">
              以下のHTMLコードをコピーし、<code>.html</code> 形式のファイル（例: <code>quiz.html</code>）として保存すると、オフライン環境など、どこでも単独で動作するクイズアプリとして利用可能です。
            </p>
            <div className="relative">
              <textarea
                readOnly
                value={generateExportHTML()}
                className="w-full h-64 p-4 font-mono text-xs md:text-sm bg-slate-50 dark:bg-slate-900/50 text-slate-800 dark:text-slate-300 border border-slate-300 dark:border-slate-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 resize-y"
              />
              <button
                onClick={handleCopyExportHTML}
                className="absolute top-4 right-4 px-4 py-2 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 transition-colors shadow-md flex items-center gap-2"
              >
                コードをコピー
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}
</script>
</body>
</html>
